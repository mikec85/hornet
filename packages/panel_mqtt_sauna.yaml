number:
  - platform: template
    name: "My Triggering Variable"
    id: var_celcius
    optimistic: true
    min_value: 0
    max_value: 100
    step: 1
    # This trigger fires ANY time the value changes!
    on_value:
      - logger.log:
          format: "The new variable value is %.1f"
          args: [ 'x' ]
      - lvgl.textarea.update:
        id: sauna_txt_celcius
        text: '!lambda "return x;"'

globals:

  - id: var_celcius2
    type: float
    restore_value: yes
  - id: var_fahrenheit
    type: float
    restore_value: no
  - id: var_state
    type: int
    restore_value: no
  - id: var_active
    type: int
    restore_value: no
  - id: var_setpoint
    type: int
    restore_value: no
  - id: var_autooff
    type: int
    restore_value: no

    
# MQTT
mqtt:
  id: mqtt_client
  broker: mqtt.coffeys.net
  on_json_message:
    - topic: sonoff/sauna
      #qos: 0
      #payload: "ON"
      then:
        - lambda: |-
            // Safely check if the key exists before assigning to prevent crashes
            if (x["celcius"].is<float>()) {
              id(var_celcius) = x["celcius"];
              lv_textarea_set_text(id(sauna_txt_celcius), x["celcius"]);
              lv_textarea_set_text(sauna_txt_celcius, x["celcius"]);
            }
            if (x["fahrenheit"].is<float>()) {
              id(var_fahrenheit) = x["fahrenheit"];
            }
            if (x["state"].is<int>()) {
              id(var_state) = x["state"];
            }
            if (x["active"].is<int>()) {
              id(var_active) = x["active"];
            }
            if (x["setpoint"].is<int>()) {
              id(var_setpoint) = x["setpoint"];
            }
            if (x["autooff"].is<int>()) {
              id(var_autooff) = x["autooff"];
            }

            // Optional: Print to the ESPHome log so you can verify it's working!
            ESP_LOGI("json_parser", "Celcius is now: %.1f", id(var_celcius));
            ESP_LOGI("json_parser", "Setpoint is now: %d", id(var_setpoint));

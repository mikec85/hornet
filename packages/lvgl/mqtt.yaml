

# MQTT
mqtt:
  id: mqtt_client2
  broker: mqtt.coffeys.net
  on_message:
    - topic: hornet-nest-3cc06c/alarm_control_panel/acp1/state
      qos: 0
      then:
        - lambda: |-
            ESP_LOGD("mqtt_on_message", "Received payload2: %s", x.c_str());
        - lvgl.label.update:
            id: sp_lbl_mode
            text: !lambda "return x.c_str() ;"

#    - topic: hornet-nest-3cc06c/binary_sensor/19_frontdoor
#      qos: 0
#      then:
#        - lambda: |-
#            ESP_LOGD("mqtt_on_message", "Received frontdoor: %s", x.c_str());
#        - lvgl.label.update:
#            id: widget_1779057290448_6amcc2dfg
#            text: !lambda "return x.c_str() ;"
            
    - topic: hornet-nest-3cc06c/binary_sensor/19_frontdoor/state
      qos: 0
      #payload: "OFF"
      then:
        - lambda: |-
            ESP_LOGD("mqtt_on_message", "Received payload: %s", x.c_str());
        - if:
            condition:
              lambda: 'return strcmp(x.c_str(), "OFF") == 0;' 
            then:  
        # Check if the payload is OFF
              - logger.log: "Executing OFF"
              - lvgl.label.update:
                  id: widget_1779057290448_6amcc2dfg
                  text: "Closed"
              - lvgl.widget.update:
                  id: widget_1779057290448_6amcc2dfg
                  text_color: "0x10B981" # Green
              - lvgl.label.update:
                  id: widget_1779057290448_rni0x55z7
                  text: "\U000F033E"
              - lvgl.widget.update:
                  id: widget_1779057290448_rni0x55z7
                  text_color: "0x10B981" # Green
        # Check if the payload is ON
        - if:
            condition:
              lambda: 'return strcmp(x.c_str(), "ON") == 0;'
            then:
              - logger.log: "Executing ON"
              - lvgl.label.update:
                  id: widget_1779057290448_6amcc2dfg
                  text: "Open"
              - lvgl.widget.update:
                  id: widget_1779057290448_6amcc2dfg
                  text_color: "0xFF0000" # Red   
              - lvgl.label.update:
                  id: widget_1779057290448_rni0x55z7
                  text: "\U000F033F"
              - lvgl.widget.update:
                  id: widget_1779057290448_rni0x55z7
                  text_color: "0xFF0000" # Red


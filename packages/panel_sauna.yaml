lvgl:      
  pages:

    - id: sauna_page
      bg_color: my_black
      widgets:              
        - image:
            id: on_off_img
            x: 360
            y: 90 
            src: 
            
        - label:
            id: sauna_temp_label
            x: 0
            y: 70
            width: 200
            height: 60
            text_color: my_white 
            text_font: montserrat_28
            text: "Temperature"

        - textarea:
            id: sauna_txt_fahrenheit
            x: 0
            y: 100
            width: 200
            height: 60
            one_line: true
            placeholder_text: "Enter text here"

        - label:
            id: sauna_set_label
            x: 0
            y: 150
            width: 200
            height: 60
            text_color: my_white 
            text_font: montserrat_28
            text: "Set Point"
        - textarea:
            id: sauna_txt_setpoint
            x: 0
            y: 180
            width: 200
            height: 60
            one_line: true
            placeholder_text: "Enter text here"

        - button:
            id: sauna_on_btn
            x: 600
            y: 0
            width: 200
            height: 60
            #checkable: true
            widgets:
              - label:
                  align: CENTER
                  text: 'Sauna'
                  styles: my_button_style 
            on_click:
              then:
                - if:
                    condition:
                      lambda: 'return id(var_state) == 0;'
                    then:
                      - mqtt.publish:
                          topic: sonoff/sauna/set
                          payload: "{\"state\":true}"
                - if:
                    condition:
                      lambda: 'return id(var_state) == 1;'
                    then:
                      - mqtt.publish:
                          topic: sonoff/sauna/set
                          payload: "{\"state\":false}"
        - button:
            id: to_main_btn4
            x: 0
            y: 0
            width: 160
            height: 60
            #checkable: true
            widgets:
              - label:
                  align: CENTER
                  text: 'Main'
                  styles: my_text_style 
            on_click:
              - lvgl.page.show: main_page   

  

number:
  - platform: template
    name: "fahrenheit"
    id: var_fahrenheit
    optimistic: true
    min_value: 0
    max_value: 100
    step: 1
    # This trigger fires ANY time the value changes!
    on_value:
      - logger.log:
          format: "The new variable value is %.1f"
          args: [ 'x' ]
      - lvgl.textarea.update:
          id: sauna_txt_fahrenheit
          text: !lambda "return to_string((int)round(x)) + \" °F\";"

  - platform: template
    name: "Setpoint"
    id: var_setpoint
    optimistic: true
    min_value: 0
    max_value: 100
    step: 1
    # This trigger fires ANY time the value changes!
    on_value:
      - logger.log:
          format: "The new variable value is %.1f"
          args: [ 'x' ]
      - lvgl.textarea.update:
          id: sauna_txt_setpoint
          text: !lambda "return to_string((int)round(x)) + \" °C\";"
          
globals:

  - id: var_celcius
    type: float
    restore_value: yes
  - id: var_fahrenheit2
    type: float
    restore_value: no
  - id: var_state
    type: int
    restore_value: no
  - id: var_active
    type: int
    restore_value: no
  - id: var_setpoint2
    type: int
    restore_value: no
  - id: var_autooff
    type: int
    restore_value: no

    
# MQTT
mqtt:
  id: mqtt_client
  broker: mqtt.coffeys.net
  on_json_message:
    - topic: sonoff/sauna
      #qos: 0
      #payload: "ON"
      then:
        - lambda: |-
            // Safely check if the key exists before assigning to prevent crashes
            if (x["celcius"].is<float>()) {
              id(var_celcius) = x["celcius"];
            }
            if (x["fahrenheit"].is<float>()) {
              id(var_fahrenheit2) = x["fahrenheit"];
              id(var_fahrenheit).make_call().set_value(x["fahrenheit"]).perform();
            }
            if (x["state"].is<int>()) {
              id(var_state) = x["state"];
            }
            if (x["active"].is<int>()) {
              id(var_active) = x["active"];
            }
            if (x["setpoint"].is<int>()) {
              id(var_setpoint2) = x["setpoint"];
              id(var_setpoint).make_call().set_value(x["setpoint"]).perform();
            }
            if (x["autooff"].is<int>()) {
              id(var_autooff) = x["autooff"];
            }
        - if:
            condition:
              lambda: 'return id(var_state) == 0;'
            then:    
              - lvgl.image.update:
                id: on_off_img
                src: fire
        - if:
            condition:
              lambda: 'return id(var_state) == 1;'
            then:    
              - lvgl.image.update:
                id: on_off_img
                src: fireoff
                
            // Optional: Print to the ESPHome log so you can verify it's working!
            ESP_LOGI("json_parser", "Celcius is now: %.1f", id(var_celcius));
            ESP_LOGI("json_parser", "Setpoint is now: %d", id(var_setpoint));

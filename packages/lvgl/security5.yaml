globals:
  - id: entered_code
    type: std::string
    # The single quotes wrapped around double quotes are required for an empty C++ string
    initial_value: '""'

script:
  # Script to append a digit to the global variable
  - id: append_digit
    parameters:
      digit: std::string
    then:
      - lambda: |-
          // Optional: Cap the max length (e.g., 10 digits) to prevent memory issues
          if (id(entered_code).length() < 10) {
            id(entered_code) += digit;
            ESP_LOGI("keypad", "Code is now: %s", id(entered_code).c_str());
          } else {
            ESP_LOGW("keypad", "Maximum code length reached!");
          }
      - lvgl.label.update:
           id: sp_lbl_code
           text: !lambda "return id(entered_code).c_str();"
  # Script to clear the input
  - id: clear_code
    then:
      - lambda: |-
          id(entered_code) = "";
          ESP_LOGI("keypad", "Code cleared");
      - lvgl.label.update:
           id: sp_lbl_code
           text: !lambda "return id(entered_code).c_str();"
          

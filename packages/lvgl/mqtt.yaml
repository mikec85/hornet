
# MQTT
mqtt:
  id: mqtt_client2
  broker: mqtt.coffeys.net
  on_message:
    - topic: hornet-nest-3cc06c/alarm_control_panel/acp1/state
      qos: 0
      then:
        - lambda: |-
            ESP_LOGD("mqtt_on_message", "Received payload2: %s", x.c_str());
        - lvgl.label.update:
            id: sp_lbl_mode
            text: !lambda "return x.c_str() ;"

    - topic: hornet-nest-3cc06c/binary_sensor/19_frontdoor
      qos: 0
      then:
        - lambda: |-
            ESP_LOGD("mqtt_on_message", "Received frontdoor: %s", x.c_str());
        - lvgl.label.update:
            id: widget_1779057290448_6amcc2dfg
            text: !lambda "return x.c_str() ;"
            

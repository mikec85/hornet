
script:
  - id: return_to_main_timer
    mode: restart  # Ensures the timer resets if you navigate away and come back
    then:
      - delay: 60s
      - lvgl.page.show: main_page

font:
  - file: "fonts/materialdesignicons-webfont.ttf"
    id: icon_font
    size: 120
    glyphs: [
          "\U000F0238", # mdi-fire  F0238
          "\U000F1722", # mdi-fire-off. F1722
          "\U000F05F1", # mdi-ev-station. F05F1 
          ]

lvgl:      
  pages:
    - id: sauna_page
      bg_color: bgblue
      on_load:
        - script.execute: return_to_main_timer
      on_unload:
        - script.stop: return_to_main_timer
      widgets:              

        # --- TOP NAVIGATION BAR ---
        - label:
            # ... other configurations
            id: on_off_label
            x: 270
            y: 10 
            text_font: icon_font
            text: "\U000F1722"
            text_color: my_black
        - label:
            # ... other configurations
            id: on_off_charger
            x: 420
            y: 10 
            text_font: icon_font
            text: "\U000F05F1"
            text_color: my_black

        - button:
            id: to_main_btn4
            x: 20
            y: 20
            width: 160
            height: 60
            widgets:
              - label:
                  align: CENTER
                  text: 'Main'
                  styles: my_text_style 
            on_click:
              - lvgl.page.show: main_page   

        - button:
            id: sauna_on_btn
            x: 600
            y: 20
            width: 180 # Pulled in slightly so right edge is at 780px instead of 800px
            height: 60
            widgets:
              - label:
                  align: CENTER
                  text: 'Sauna'
                  styles: my_button_style 
            on_click:
              then:
                - if:
                    condition:
                      and:
                        lambda: 'return id(var_state) == 0;'
                        #lambda: 'return id(var_evcharging) == "false";'
                    then:
                      - mqtt.publish:
                          topic: sonoff/sauna/set
                          payload: "{\"state\":true}"
                - if:
                    condition:
                      lambda: 'return id(var_state) == 1;'
                    then:
                      - mqtt.publish:
                          topic: sonoff/sauna/set
                          payload: "{\"state\":false}"

        # --- LEFT SIDE: CURRENT TEMPERATURE ---
        
        - label:
            id: sauna_temp_label
            x: 80
            y: 220
            width: 200
            height: 40
            text_color: my_white 
            text_font: montserrat_28
            # text_align: center # Uncomment if you want the text centered in the 200px box
            text: "Temperature"

        - textarea:
            id: sauna_txt_fahrenheit
            x: 80
            y: 280
            width: 200
            height: 80
            one_line: false
            text_font: montserrat_28
            placeholder_text: "-- °F"

        # Autooff Textarea
        - textarea:
            id: sauna_txt_autooff
            x: 80
            y: 380
            width: 200
            height: 80
            hidden: true
            one_line: false
            text_font: montserrat_28
            placeholder_text: "--"
            
        # --- RIGHT SIDE: SETPOINT CONTROLS ---

        - label:
            id: sauna_set_label
            x: 420 
            y: 220
            width: 320 # Exactly spans the 3 widgets below (420 to 740)
            height: 40
            text_color: my_white 
            text_font: montserrat_28
            # text_align: center # Uncomment if you want the text centered in the 320px box
            text: "Set Point"

        # Decrease (-) Button
        - button:
            id: sauna_set_dec_btn
            x: 420
            y: 280
            width: 80
            height: 80
            widgets:
              - label:
                  align: CENTER
                  text: "-"
                  text_font: montserrat_28
                  styles: my_text_style 
            on_click:
              then:
                - logger.log: "Decrease setpoint pressed"
                - mqtt.publish:
                    topic: sonoff/sauna/set
                    payload: !lambda |-
                      id(var_setpoint2)--;
                      char buf[50];
                      sprintf(buf, "{\"setpoint\": %d }", id(var_setpoint2));
                      return {buf};

        # Setpoint Textarea
        - textarea:
            id: sauna_txt_setpoint
            x: 520
            y: 280
            width: 120
            height: 80
            one_line: false
            text_font: montserrat_28
            placeholder_text: "-- °C"

        # Setpoint Textarea
        - textarea:
            id: sauna_txt_setpoint_f
            x: 520
            y: 380
            width: 120
            height: 80
            one_line: false
            text_font: montserrat_28
            placeholder_text: "-- °F"


        # Increase (+) Button
        - button:
            id: sauna_set_inc_btn
            x: 660
            y: 280
            width: 80
            height: 80
            widgets:
              - label:
                  align: CENTER
                  text: "+"
                  text_font: montserrat_28
                  styles: my_text_style 
            on_click:
              then:
                - logger.log: "Increase setpoint pressed"
                - mqtt.publish:
                    topic: sonoff/sauna/set
                    payload: !lambda |-
                      id(var_setpoint2)++;
                      char buf[50];
                      sprintf(buf, "{\"setpoint\": %d }", id(var_setpoint2));
                      return {buf};
